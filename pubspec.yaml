name: dart_rip_log
description: >
  Parses CD rip log files from EAC, XLD, and other rippers into structured,
  JSON-serialisable quality data (AccurateRip, CRCs, peaks, errors).
version: 0.1.0
homepage: https://github.com/bovinemagnet/dart_rip_log
repository: https://github.com/bovinemagnet/dart_rip_log
issue_tracker: https://github.com/bovinemagnet/dart_rip_log/issues

topics:
  - cd
  - audio
  - parser
  - ripping
  - accuraterip

environment:
  sdk: '>=3.5.0 <4.0.0'

executables:
  riplog:

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
  benchmark_harness: ^2.3.0
